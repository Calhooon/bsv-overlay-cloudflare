# low-app-layer — LOW's browser-facing READ surface for chain facts
# (bsv-low: the game client must stop reading WhatsOnChain).
#
# Serves /utxo-status, /beef/:txid, /tip, /health straight from the
# low-overlay's D1 database (the same `low-overlay-db` the low-overlay
# worker writes) plus the rust-chaintracks service binding for the tip.
# STRICTLY READ-ONLY: this worker never writes to the DB — the overlay
# owns the schema and every mutation. Deploy with:
#
#   npx wrangler deploy   # from crates/low-app-layer/
#
# account_id comes from the CLOUDFLARE_ACCOUNT_ID environment variable.
# No secrets: every route serves public chain facts.

name = "low-app-layer"
main = "build/worker/shim.mjs"
compatibility_date = "2024-12-01"

[build]
# Pin worker-build to ^0.7 — newer 0.8+ requires worker crate >= 0.8 but this
# crate pins worker 0.7.5 (matching overlay-cloudflare). Without the version
# pin, `cargo install` grabs the latest worker-build and the build fails with
# "Unsupported version worker@0.7.5, expected at least worker@0.8.0".
command = "cargo install -q --version ^0.7 worker-build && worker-build --release"

# The SAME D1 database the low-overlay worker writes (wrangler.low.toml uses
# the identical binding name + database_name). This worker only ever SELECTs
# from it. database_id is a placeholder by repo convention — the real id is
# injected at deploy time and never committed.
[[d1_databases]]
binding = "OVERLAY_DB"
database_name = "low-overlay-db"
database_id = "YOUR_D1_DATABASE_ID"  # set to your own D1 database id

# Service binding to the ChainTracks worker (same account). /tip uses this to
# resolve the present chain height: a plain workers.dev URL fetch to a
# same-account worker loops back to this worker (returns our own 404), so the
# binding is required for the fetch to reach ChainTracks. `service` is a
# worker name, not a secret.
[[services]]
binding = "CHAINTRACKS"
service = "rust-chaintracks"
